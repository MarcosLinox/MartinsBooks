<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./reset.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Krona+One&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">    
    <title>AluraBooks</title>
</head>
<body>
    <header class="cabeçalho">
        <div class="conteiner">
            <input type="checkbox" id="menu" class="conteiner__botao">
            <!-- label serve para associar o clique no ícone ao checkbox acima usando o id -->
            <label for="menu">
                <span class="cabeçalho__menuHamburguer conteiner__imagem"></span>
            </label>
            <ul class="lista__menu">
                <li class="lista__menu__titulo">Categorias</li>
                <li class="lista__menu__item">
                    <a href="#" class="lista__menu__link">Programação</a>
                </li>
                <li class="lista__menu__item">
                    <a href="#" class="lista__menu__link">Front-end</a>
                </li>
                <li class="lista__menu__item">
                    <a href="#" class="lista__menu__link">Infraestrutura</a>
                </li>
                <li class="lista__menu__item">
                    <a href="#" class="lista__menu__link">Business</a>
                </li>
                <li class="lista__menu__item">
                    <a href="#" class="lista__menu__link">Desing & UX</a>
                </li>
            </ul>
            <img class="conteiner__imagem" src="assets/Logo.svg" alt="Logo da AluraBooks">
        </div>
        <div class="conteiner">
            <a class="conteiner__imagem" href="#"><img src="assets/Favoritos.svg" alt="Meus favoritos"></a>
            <a class="conteiner__imagem" href="#"><img src="assets/Usuario.svg" alt="Meu perfil"></a>
            <a class="conteiner__imagem" href="#"><img src="assets/Compras.svg" alt="Carrinho de compras"></a>
        </div>
    </header>
    <section class="banner">
        <h2 class="banner__titulo">Já sabe por onde começar?</h2>
        <p class="banner__texto">Encontre em nossa estante o que precisa para seu desenvolvimento!</p>
        <input type="search" class="banner__pesquisa" placeholder="Qual será sua próxima leitura">
    </section>
</body>
</tml>
